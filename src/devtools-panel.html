<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jails Inspector Panel</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            width: 100%;
            height: 100%;
        }
        #app {
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="app">

        <div id="radar"></div>

        <div class="header">
            <h1 class="title"><img src="./logo.png" width="100" /> Jails Inspector</h1>
            <div>
                <button id="radar-btn" class="btn btn-primary">radar</button>
                <button id="scan-btn" class="btn btn-primary">rescan</button>
            </div>
        </div>
        
        <div class="main-layout">
            <div id="info-panel" class="info-panel">
                <p class="placeholder">Select a component to view details</p>
            </div>
            
            <div id="canvas-container" class="canvas-container">
                <canvas id="graph-canvas"></canvas>
                <div class="controls">
                    <button id="zoom-in" class="btn btn-small" title="Zoom In">+</button>
                    <button id="zoom-out" class="btn btn-small" title="Zoom Out">−</button>
                    <button id="reset-view" class="btn btn-small" title="Reset View">⊙</button>
                </div>
            </div>
        </div>
    </div>

    <script src="visualizer.js"></script>
    <script src="devtools-panel.js"></script>
    <script src="radar.js"></script>
</body>
</html>
